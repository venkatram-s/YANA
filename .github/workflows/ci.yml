name: CI / Android Build Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_web:
    runs-on: ubuntu-latest
    name: Build Web Production Bundle
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run Linting
        run: npm run lint
      - name: Build Vite App
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: dist

  build_android:
    needs: build_web
    runs-on: ubuntu-latest
    name: Build Android APK
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Download Web Build
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: dist
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build Android (Debug/Unsigned)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
