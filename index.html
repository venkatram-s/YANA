<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; connect-src * https://api.groq.com https://api.allorigins.win https://html.duckduckgo.com;">
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="YANA: Yet Another News Aggregator. A high-contrast, cryptographically secure news enclave." />
    <title>YANA | News Aggregator Enclave</title>
    <script>
      // ONE-STOP DEBUG OVERLAY: Reports crashes directly on the Android screen if the App fails to boot.
      window.onerror = function(msg, url, line, col, error) {
        var overlayId = 'yana-error-overlay';
        if (document.getElementById(overlayId)) return;
        var div = document.createElement('div');
        div.id = overlayId;
        div.style = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:999999;background:rgba(10,0,0,0.98);color:#ff4444;padding:30px;font-family:monospace;overflow:auto;font-size:13px;border:10px solid #ff4444;box-shadow:inset 0 0 50px #ff0000;';
        div.innerHTML = '<h1 style="color:#ff0000;margin-top:0;">🛑 YANA_KERNAL_CRASH</h1>' +
          '<div style="background:#1a0000;padding:15px;border:1px solid #ff4444;">' +
          '<p><strong>MESSAGE:</strong> ' + msg + '</p>' +
          '<p><strong>TRACE:</strong> ' + (url || 'Internal Source') + ' [' + line + ':' + col + ']</p>' +
          '<pre style="white-space:pre-wrap;background:#000;padding:10px;margin-top:20px;border-left:4px solid #ff0000;">' + (error && error.stack || 'NO STACK_TRACE') + '</pre>' +
          '</div><br>' +
          '<button onclick="location.reload()" style="background:#ff4444;color:white;padding:15px 30px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;width:100%;font-size:16px;">FORCE_RELOAD_APPLICATION</button>';
        document.body.appendChild(div);
      };
      window.onunhandledrejection = function(event) {
        window.onerror("PROMISE_REJECTION: " + event.reason, "", 0, 0, event.reason);
      };
    </script>
    <script>
      // 🛑 EMERGENCY CACHE PURGE: Annihilates old phantom bundles causing 'w is not a function' cache-traps
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) { registration.unregister(); }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
